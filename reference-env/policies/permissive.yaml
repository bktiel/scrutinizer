apiVersion: scrutinizer/v1
kind: PosturePolicy
metadata:
  name: permissive-baseline
  version: "1.0"

rules:
  - id: scorecard-minimum
    description: "Flag components with low Scorecard scores"
    field: scorecard.score
    operator: gte
    threshold: 3.0
    severity: WARN

  - id: provenance-advisory
    description: "Advise when provenance is absent (informational only)"
    field: provenance.present
    operator: eq
    value: true
    severity: INFO

scoring:
  method: pass_fail
  thresholds:
    PASS: 3.0
    WARN: 1.0
