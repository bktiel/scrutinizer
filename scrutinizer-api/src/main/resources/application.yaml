spring:
  application:
    name: scrutinizer-api
  datasource:
    url: jdbc:postgresql://localhost:5450/scrutinizer
    username: scrutinizer
    password: scrutinizer
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
