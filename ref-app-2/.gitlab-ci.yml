stages:
  - build
  - scan

variables:
  SCRUTINIZER_API_URL: "http://api:8080"
  SCRUTINIZER_APP_NAME: "ref-app-2"

install:
  stage: build
  image: node:20-alpine
  script:
    - npm ci --ignore-scripts
    - npx @cyclonedx/cyclonedx-npm --output-file sbom.json --ignore-npm-errors || true
    - |
      if [ ! -f sbom.json ]; then
        echo "cdxgen fallback: copying pre-generated SBOM"
        cp /scrutinizer-sboms/ref-app-2.cdx.json sbom.json || true
      fi
    - ls -la sbom.json
  artifacts:
    paths:
      - sbom.json
    expire_in: 1 hour

scrutinizer-scan:
  stage: scan
  image: curlimages/curl:latest
  needs: [install]
  variables:
    # Set SCRUTINIZER_POLICY_ID as a CI/CD variable in GitLab project settings
    SCRUTINIZER_POLICY_ID: "${SCRUTINIZER_POLICY_ID}"
  script:
    - |
      echo "========================================="
      echo " Scrutinizer Policy Evaluation"
      echo "========================================="
      echo ""
      echo " API:       $SCRUTINIZER_API_URL"
      echo " Policy:    $SCRUTINIZER_POLICY_ID"
      echo " App:       $SCRUTINIZER_APP_NAME"
      echo ""

      if [ -z "$SCRUTINIZER_POLICY_ID" ]; then
        echo "ERROR: SCRUTINIZER_POLICY_ID not set."
        echo "Add it as a CI/CD variable in GitLab project settings."
        exit 1
      fi

      if [ ! -f sbom.json ]; then
        echo "ERROR: sbom.json not found. Build stage may have failed."
        exit 1
      fi

      START_TIME=$(date +%s)

      # Submit SBOM to Scrutinizer API (multipart form)
      HTTP_CODE=$(curl -s -w "%{http_code}" -o result.json \
        -X POST "${SCRUTINIZER_API_URL}/api/v1/runs" \
        -F "sbom=@sbom.json" \
        -F "applicationName=${SCRUTINIZER_APP_NAME}" \
        -F "policyId=${SCRUTINIZER_POLICY_ID}")

      END_TIME=$(date +%s)
      ELAPSED=$((END_TIME - START_TIME))

      echo "HTTP Response:  $HTTP_CODE"
      echo "Eval Time:      ${ELAPSED}s"
      echo ""

      if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
        echo "ERROR: API returned HTTP $HTTP_CODE"
        cat result.json 2>/dev/null
        exit 1
      fi

      # Parse results (jq not available in curl image, use grep)
      DECISION=$(grep -o '"overallDecision":"[^"]*' result.json | cut -d'"' -f4)
      SCORE=$(grep -o '"postureScore":[0-9.]*' result.json | cut -d':' -f2)
      RUN_ID=$(grep -o '"id":"[^"]*' result.json | head -1 | cut -d'"' -f4)

      echo "========================================="
      echo " Results"
      echo "========================================="
      echo ""
      echo " Decision:  $DECISION"
      echo " Score:     $SCORE"
      echo " Run ID:    $RUN_ID"
      echo ""

      # Save report
      cat result.json > posture-report.json

      case "$DECISION" in
        PASS)
          echo "PASS - All policy checks satisfied."
          exit 0
          ;;
        WARN)
          echo "WARN - Policy warnings detected (non-blocking)."
          exit 0
          ;;
        FAIL)
          echo "FAIL - Policy violations detected."
          echo ""
          echo "Review findings in the Scrutinizer dashboard:"
          echo "  ${SCRUTINIZER_API_URL/api:8080/dashboard:3000}/runs/$RUN_ID"
          exit 1
          ;;
        *)
          echo "Unknown decision: $DECISION"
          exit 1
          ;;
      esac
  artifacts:
    when: always
    paths:
      - posture-report.json
    expire_in: 30 days
  allow_failure: false
